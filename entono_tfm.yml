name: entorno_tfm
channels:
  - pytorch        # canal oficial para torch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy=1.26.4
  - scikit-learn=1.7.2
  - pandas=2.3.3
  - matplotlib=3.10.8
  - seaborn=0.13.2
  - ipykernel=7.2.0

  # ── Deep learning ─────────────────────────────────────────────────
  - pytorch=2.11.0    # modelos D-PACK (CNN + Autoencoder)
  - cpuonly           # quitar esta línea si tienes GPU NVIDIA
  - tensorflow=2.10.0 # notebooks Autoencoder + DT-KNN-SVM (Mirai, NSL-KDD, DS2OS, IoT-23)

  # ── Procesado de tráfico de red ───────────────────────────────────
  - dpkt=1.9.8        # extracción de flujos desde .pcap/.pcapng (D-PACK Mirai Paper, Markov Mirai)

  - pip
  - pip:
    - interpret==0.7.8   # EBM (notebooks_xai, aportaciones)
    - shap==0.49.1       # SHAP (RF + SHAP.ipynb)
    - jupyterlab         # opcional, solo si no abres los notebooks desde VS Code
